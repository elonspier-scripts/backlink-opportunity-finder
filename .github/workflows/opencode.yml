name: opencode
on:
  issue_comment:
    types: [created]

# ADD THIS PERMISSIONS BLOCK HERE
permissions:
  contents: read
  id-token: write      # Fixes the OIDC error
  issues: write        # Allows the bot to reply in chat
  pull-requests: write # Allows the bot to reply in PRs

jobs:
  opencode:
    if: contains(github.event.comment.body, '/oc')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anomalyco/opencode/github@latest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          model: openai/gpt-5.3-codex  # Use gpt-4o for best results

